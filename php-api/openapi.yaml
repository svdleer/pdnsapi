    post:
      summary: Domain-Account operations
      description: |
        Perform operations to manage domain-account relationships.
        
        **🔑 Requires Admin API Key**
        
        **⚠️ CRITICAL SECURITY WARNINGS:**
        - **DOMAIN HIJACKING RISK:** Can reassign domains between accounts
        - **OWNERSHIP VALIDATION:** Must verify current account owns domain before changes
        - **AUDIT TRAIL:** All domain reassignments logged with timestamps and user info
        - **IRREVERSIBLE:** Domain reassignments cannot be easily undone
        
        **🔐 SECURITY REQUIREMENTS:**
        - Admin API key required for ALL operations
        - Domain ownership verified before any modifications
        - Account permissions checked before assignments
        - Rate limiting enforced to prevent abuse
      tags:
        - Domain-Account
      parameters:
        - name: action
          in: query
          required: true
          schema:
            type: string
            enum: [add, remove, list]
          description: Action to perform (add, remove, list)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/DomainAccountAdd'
                - $ref: '#/components/schemas/DomainAccountRemove'
                - $ref: '#/components/schemas/DomainAccountList'
            examples:
              add_domain:
                summary: Add domain to account
                value:
                  domain_name: "example.com."
                  account_id: 1
              remove_domain:
                summary: Remove domain from account
                value:
                  domain_name: "example.com."
              list_domains:
                summary: List account domains
                value:
                  account_id: 1
      responses:
        '200':
          description: Operation completed successfully
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/SuccessMessage'
                  - $ref: '#/components/schemas/AccountDomainsList'
        '400':
          description: |
            Bad request - invalid operation parameters
            - Invalid domain name format
            - Missing required fields
            - Invalid account ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized - Valid Admin API Key required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: |
            Forbidden - security violation
            - Domain not owned by source account
            - Insufficient permissions for domain reassignment
            - Account lacks required privileges
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: |
