openapi: 3.0.3
info:
  title: PowerDNS Admin API - Administrator Documentation
  description: |
    **Administrator API** - Full system access for PowerDNS management and configuration.
    
    For user-focused documentation, see `/openapi-user.yaml`
    
    ## Authentication
    
    **Admin API Key Required** - Single API key provides full administrative access.
    Include `X-API-Key` or `Authorization: Bearer` header in requests.
    
    **Dual Authentication:**
    1. **Valid Admin API Key** - From AVANT_API_KEY environment variable
    2. **Global IP Allowlist** - Client IP must be in allowlist
    
    ## Account-Scoped API Keys (New)
    
    Create and manage account-scoped API keys for customers/users:
    - Restrict access to specific account's domains
    - Granular permissions (read, write, create, delete)
    - Optional per-key IP restrictions
    - Expiration dates and usage tracking
    - See `/api/api-keys` endpoints below
    
    ## Environment Configuration
    All sensitive configuration (API keys, database credentials, hosts) is stored in `.env`:
    - `AVANT_API_KEY` - Admin API key for authentication
    - `PDNS_API_KEY` - PowerDNS Admin API key
    - `PDNS_SERVER_KEY` - PowerDNS Server API key
    - `API_DB_HOST`, `API_DB_NAME`, `API_DB_USER`, `API_DB_PASS` - Local business logic database
    - `PDNS_ADMIN_DB_HOST`, `PDNS_ADMIN_DB_NAME`, `PDNS_ADMIN_DB_USER`, `PDNS_ADMIN_DB_PASS` - PowerDNS Admin database
    - IP allowlist and other security settings
    
    ## Core Features
    - Account and user management with PowerDNS Admin sync
    - Domain management with intelligent ID/name detection
    - DNS record management via PowerDNS Server API
    - Template-based domain creation
    - Local database caching and metadata storage
    - Secure environment-based configuration (no hardcoded credentials)
  version: 1.1.0
  contact:
    name: API Support - Silvester van der Leer
    email: silvester@avant.nl
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://pdnsapi.avant.nl/
    description: Production server (PowerDNS Admin API)

security:
  - AdminApiKey: []

paths:
  /:
    get:
      summary: API Documentation
      description: Returns API documentation and available endpoints
      tags:
        - Documentation
      security: []  # No authentication required
      responses:
        '200':
          description: API documentation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiDocumentation'

  /accounts:
    get:
      summary: Get accounts with smart filtering
      description: |
        Retrieve accounts from local database with PowerDNS Admin synchronization.
        
        **🔑 Requires Admin API Key**
        
        **Filter Logic (AND conditions):**
        - Single parameter: Direct lookup
        - Multiple parameters: Must ALL match (validation)
        - `?id=14&username=admin` returns user only if ID 14 has username "admin"
        - Returns 404 if parameters don't match the same user
      tags:
        - Accounts
      parameters:
        - name: id
          in: query
          schema:
            type: integer
          description: Filter by account ID (can combine with other filters for validation)
        - name: username
          in: query
          schema:
            type: string
          description: Filter by username (can combine with ID for validation)
        - name: email
          in: query
          schema:
            type: string
          description: Filter by email address (can combine with other filters)
        - name: sync
          in: query
          schema:
            type: boolean
          description: Sync from PowerDNS Admin before filtering
      responses:
        '200':
          description: List of accounts or single account (with AND validation)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Account'
                  message:
                    type: string
              examples:
                all_accounts:
                  summary: All accounts
                  value:
                    data: []
                    message: "Users retrieved successfully (47 users available)"
                single_filter:
                  summary: Single filter (ID only)
                  value:
                    data: [{"id": 14, "username": "admin"}]
                    message: "Found 1 user with ID 14"
                and_validation_success:
                  summary: AND validation success
                  value:
                    data: [{"id": 14, "username": "admin"}]
                    message: "Found user with ID 14 and username 'admin'"
        '401':
          description: Unauthorized - Valid Admin API Key required
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '404':
          description: No accounts found or AND validation failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '500':
          $ref: '#/components/responses/ServerError'

    post:
      summary: Create a new account
      description: |
        Create a new account with optional IP addresses. The account is created in both PDNSAdmin and local database.
        
        **� Requires Admin API Key**
      tags:
        - Accounts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountCreate'
            examples:
              powerdns_admin_user:
                summary: PowerDNS Admin User Creation
                value:
                  username: "testuser1754424578"
                  plain_text_password: "36440b7d5ab7521f"
                  firstname: "Test"
                  lastname: "User"
                  email: "test@example.com"
                  role:
                    id: 2
                    name: "User"
                  ip_addresses: ["192.168.1.101", "192.168.1.102", "2001:db8::2"]
                  customer_id: 1001
      responses:
        '201':
          description: Account created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '400':
          description: Bad Request - Invalid input data
        '401':
          description: Unauthorized - Valid Admin API Key required
        '409':
          description: Conflict - Username or email already exists
        '500':
          $ref: '#/components/responses/ServerError'

    put:
      summary: Update account
      description: |
        Update an existing account using JSON input. Changes are synced with PDNSAdmin (except IP addresses).
        
        **� Requires Admin API Key**
        
        **JSON Payload (Required):**
        - Include account identifier (`id` or `username`)
        - Include fields to update
        - IP addresses are stored locally only
      tags:
        - Accounts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountUpdateRequest'
            examples:
              update_by_id:
                summary: Update account by ID
                value:
                  id: 94
                  firstname: "Updated First Name"
                  lastname: "Updated Last Name"
                  email: "updated@example.com"
                  ip_addresses: ["192.168.1.101", "192.168.1.102"]
              update_by_username:
                summary: Update account by username
                value:
                  username: "johndoe"
                  customer_id: 1001
                  ip_addresses: ["192.168.1.200", "2001:db8::5"]
      responses:
        '200':
          description: Account updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

    delete:
      summary: Delete account
      description: |
        Delete an account from PowerDNS Admin using JSON input. The local database is automatically synced after deletion.
        
        **� Requires Admin API Key**
        **⚠️ Warning:** This action cannot be undone.
        
        **JSON Payload (Required):**
        - Use `{"id": 94}` to delete account by ID
        - Use `{"username": "johndoe"}` to delete account by username
        
        **Important:** This operation only deletes from PowerDNS Admin. The local database is updated through 
        automatic synchronization, ensuring the API remains the authoritative source for account management.
      tags:
        - Accounts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountIdentifier'
            examples:
              delete_by_id:
                summary: Delete account by ID
                value:
                  id: 94
              delete_by_username:
                summary: Delete account by username
                value:
                  username: "johndoe"
      responses:
        '200':
          description: Account deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  /domains:
    get:
      summary: Get domains with intelligent search
      description: |
        Retrieve domains/zones with automatic PowerDNS Admin synchronization.
        
        **Smart Query with AND Filters:**
        - `q` parameter: Auto-detects search type (ID/name/pattern/contains)  
        - Additional filters: Combined as AND conditions
        - `?q=example.com&account_id=5` finds "example.com" AND belongs to account 5
      tags:
        - Domains
        - Domain Search
      parameters:
        - name: q
          in: query
          schema:
            type: string
          description: Smart query (auto-detects ID/name/pattern/contains) - primary filter
        - name: account_id
          in: query
          schema:
            type: integer
          description: Additional filter - must match account (AND condition with q)
        - name: sync
          in: query
          schema:
            type: boolean
          description: Sync from PowerDNS Admin before filtering
        - name: details
          in: query
          schema:
            type: boolean
          description: Include full DNS records via PowerDNS Server API (requires PowerDNS API key)
      responses:
        '200':
          description: List of domains/zones
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      oneOf:
                        - $ref: '#/components/schemas/Domain'
                        - $ref: '#/components/schemas/DomainDetails'
                  message:
                    type: string
                  query_type:
                    type: string
                    enum: ["all", "id", "name", "pattern", "contains", "account"]
                    description: The type of query that was executed

    post:
      summary: Advanced domain search
      description: |
        Search domains with JSON payload for complex queries and filters.
        Supports combined filters and advanced options.
      tags:
        - Domains
        - Domain Search
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: integer
                  description: Domain ID for exact lookup
                name:
                  type: string
                  description: Exact domain name
                pattern:
                  type: string
                  description: Pattern search (supports * wildcards)
                contains:
                  type: string
                  description: Contains search (case-insensitive)
                account_id:
                  type: integer
                  description: Filter by account ID
                details:
                  type: boolean
                  description: Include full DNS records
                sync:
                  type: boolean
                  description: Sync from PowerDNS Admin first
            examples:
              search_by_id:
                summary: Get domain by ID
                value:
                  id: 123
              search_by_name:
                summary: Get domain by name
                value:
                  name: "example.com"
              pattern_search:
                summary: Pattern search
                value:
                  pattern: "*avant*"
                  details: true
              account_domains:
                summary: Get account domains
                value:
                  account_id: 1
      responses:
        '200':
          description: Domain search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      oneOf:
                        - $ref: '#/components/schemas/Domain'
                        - $ref: '#/components/schemas/DomainDetails'
                  message:
                    type: string
                  query_type:
                    type: string
                  filters_applied:
                    type: object

    put:
      summary: Update domain by ID or name  
      description: |
        Update domain settings and DNS records.
        Supports both ID and name-based updates with PowerDNS Admin and Server API integration.
        
        **🔑 Requires Admin API Key**
        
        **⚠️ SECURITY WARNINGS:**
        - **Domain Ownership:** Only domains owned by authenticated account can be modified
        - **DNS Record Validation:** All DNS records are validated before application
        - **Account Transfer:** Changing account_id requires ownership verification
        - **Zone Type Changes:** Changing kind/masters affects DNS resolution - use with caution
        
        **🛡️ VALIDATION ENFORCED:**
        - DNS record content validated (A/AAAA/CNAME/MX formats)
        - Master server IPs validated for Slave zones
        - Account ownership verified before transfers
        - DNSSEC changes require additional validation
      tags:
        - Domains
        - Domain Management
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: integer
                  description: Domain ID (use this OR name, not both)
                name:
                  type: string
                  description: Domain name (use this OR id, not both)
                account_id:
                  type: integer
                  nullable: true
                  description: Account ID to assign domain to
                kind:
                  type: string
                  enum: [Native, Master, Slave]
                  description: Zone kind
                masters:
                  type: array
                  items:
                    type: string
                  description: Master servers (for Slave zones)
                dnssec:
                  type: boolean
                  description: Enable DNSSEC
                rrsets:
                  type: array
                  description: DNS record updates (PowerDNS Server API)
                  items:
                    $ref: '#/components/schemas/RRSetUpdate'
              anyOf:
                - required: [id]
                - required: [name]
            examples:
              update_by_id:
                summary: Update domain by ID
                value:
                  id: 123
                  kind: "Native"
                  dnssec: true
              update_by_name:
                summary: Update domain by name
                value:
                  name: "example.com"
                  account_id: 2
              update_dns_records:
                summary: Update DNS records by name
                value:
                  name: "example.com"
                  rrsets:
                    - name: "www.example.com."
                      type: "A"
                      changetype: "REPLACE"
                      records:
                        - content: "192.168.1.100"
      responses:
        '200':
          description: Domain updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  validation_warnings:
                    type: array
                    items:
                      type: string
        '400':
          description: Bad Request - Invalid DNS records or validation failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  field:
                    type: string
        '401':
          description: Unauthorized - Valid Admin API Key required
        '403':
          description: Forbidden - Domain ownership verification failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '404':
          description: Domain not found
        '422':
          description: Validation Error - DNS record validation failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  validation_errors:
                    type: array
                    items:
                      type: object
                      properties:
                        field:
                          type: string
                        error:
                          type: string

    delete:
      summary: Delete domain by ID or name
      description: |
        **🚨 DESTRUCTIVE OPERATION** - Delete domain permanently.
        
        **🔑 Requires Admin API Key**
        
        **⚠️ CRITICAL SECURITY WARNINGS:**
        - **Irreversible Action:** Domain deletion cannot be undone
        - **Ownership Verification:** Only domains owned by authenticated account can be deleted  
        - **DNS Resolution Impact:** Domain will immediately stop resolving
        - **Cascade Effects:** All DNS records will be permanently lost
        - **Zone Dependencies:** Check for dependent subdomains before deletion
        
        **🛡️ SAFETY MEASURES:**
        - Domain ownership verified before deletion
        - Audit logging with administrator details
        - PowerDNS Admin and local database automatically synced
      tags:
        - Domains
        - Domain Management
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: integer
                  description: Domain ID (use this OR name, not both)
                name:
                  type: string
                  description: Domain name (use this OR id, not both)
              anyOf:
                - required: [id]
                - required: [name]
            examples:
              delete_by_id:
                summary: Delete domain by ID
                value:
                  id: 123
              delete_by_name:
                summary: Delete domain by name
                value:
                  name: "example.com"
      responses:
        '200':
          description: Domain deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  audit_log:
                    type: object
                    properties:
                      deleted_at:
                        type: string
                        format: date-time
                      records_count:
                        type: integer
                        description: "Number of DNS records that were deleted"
        '400':
          description: Bad Request - Invalid domain identifier
        '401':
          description: Unauthorized - Valid Admin API Key required
        '403':
          description: Forbidden - Domain ownership verification failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '404':
          description: Domain not found
        '409':
          description: Conflict - Domain has active dependencies
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  dependencies:
                    type: array
                    items:
                      type: string
        '500':
          $ref: '#/components/responses/ServerError'

    post:
      summary: Add domain to account
      description: |
        Add a domain to a specific account. This operation uses direct API calls
        to assign domains to accounts in PowerDNS Admin.
        
        **JSON Payload:**
        - `domain_name`: Domain name to assign (required)
        - `account_id`: Target account ID (required)
      tags:
        - Domains
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [domain_name, account_id]
              properties:
                domain_name:
                  type: string
                  description: Domain name to add (include trailing dot)
                account_id:
                  type: integer
                  description: Account ID to assign domain to
            examples:
              add_domain_to_account:
                summary: Add domain to account
                value:
                  domain_name: "example.com."
                  account_id: 1
      responses:
        '200':
          description: Domain added to account successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  /domains/{id}:
    get:
      summary: Get individual domain by ID
      description: |
        Retrieve a specific domain by its ID from the local database.
      tags:
        - Domains
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Domain ID
      responses:
        '200':
          description: Domain details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Domain'
                  message:
                    type: string
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    
    put:
      summary: Update domain by ID (path parameter)
      description: |
        Update a specific domain using path parameter for ID.
        Alternative to PUT /domains with JSON payload.
        
        **🔐 SECURITY REQUIREMENTS:**
        - Admin API key required for ALL modifications
        - Ownership validation enforced (can only modify domains you own)
        - Input validation prevents DNS record injection attacks
        - All changes logged for audit trails
      tags:
        - Domains
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Domain ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DomainUpdate'
            examples:
              change_account:
                summary: Change domain account
                value:
                  account_id: 2
              update_settings:
                summary: Update domain settings
                value:
                  kind: "Slave"
                  masters: ["192.168.1.100"]
                  dnssec: true
      responses:
        '200':
          description: Domain updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '400':
          description: |
            Bad request - invalid input data
            - Invalid domain configuration
            - Malformed JSON payload
            - Invalid DNS record format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: |
            Forbidden - security violation
            - Domain not owned by authenticated user
            - Insufficient permissions for operation
            - API key lacks required privileges
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: |
            Validation failed
            - DNS record validation errors
            - Domain name format violations
            - Invalid record type combinations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/ServerError'

    delete:
      summary: Delete domain by ID
      description: |
        Delete a domain from both local database and PowerDNS Admin.
        
        **⚠️ DANGER: IRREVERSIBLE OPERATION**
        - Permanently deletes domain and ALL DNS records
        - Cannot be undone - ensure you have backups
        - Requires admin API key with full privileges
        
        **🔐 SECURITY REQUIREMENTS:**
        - Admin API key required for ALL deletions
        - Ownership validation enforced (can only delete domains you own)
        - Domain must be in "inactive" state before deletion
        - All operations logged for audit trails
      tags:
        - Domains
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Domain ID
        - name: force
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: Force deletion even if domain has active records (dangerous)
      responses:
        '200':
          description: Domain deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '403':
          description: |
            Forbidden - security violation
            - Domain not owned by authenticated user
            - Domain has active DNS records (use force=true to override)
            - API key lacks deletion privileges
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Conflict - cannot delete
            - Domain has active DNS records
            - Domain is referenced by other resources
            - Concurrent modification detected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/ServerError'

  /templates:
    get:
      summary: Get all domain templates
      description: |
        Retrieve all available domain templates from PowerDNS Admin.
        Templates can be used to create domains with predefined settings.
        
        **🔑 Requires Admin API Key**
      tags:
        - Templates
      responses:
        '200':
          description: List of domain templates
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Template'
                  message:
                    type: string
        '401':
          description: Unauthorized - Valid Admin API Key required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/ServerError'

    post:
      summary: Create new domain template
      description: |
        Create a new domain template in PowerDNS Admin.
        
        **🔑 Requires Admin API Key**
        
        **🔐 SECURITY CONSIDERATIONS:**
        - Template content validated for DNS record injection
        - Template names must be unique and follow naming conventions
        - All template creation logged for audit trails
        - Input sanitization prevents malicious template content
      tags:
        - Templates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TemplateCreate'
      responses:
        '201':
          description: Template created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '400':
          description: |
            Bad request - invalid template data
            - Invalid DNS record format in template
            - Malformed JSON payload
            - Template name validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized - Valid Admin API Key required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: |
            Conflict - template already exists
            - Template name already in use
            - Duplicate template content detected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: |
            Validation failed
            - DNS record validation errors in template
            - Invalid template structure
            - Template content security violations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/ServerError'

  /templates/{id}:
    get:
      summary: Get template by ID
      description: |
        Retrieve a specific domain template by its ID.
      tags:
        - Templates
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Template ID
      responses:
        '200':
          description: Template details
          content:
            application/json:
              schema:
                type: object
