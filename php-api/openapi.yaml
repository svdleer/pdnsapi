                        description: "⚠️ SAVE THIS! Full key only shown once"
                        example: "pdns_d0dbc9fd6f0cb69319c84e755dbf8d78e72f46720dfa9a2e..."
                      account_id:
                        type: integer
                        example: 5
                      account_username:
                        type: string
                        example: "customer_account"
                      description:
                        type: string
                        example: "Customer portal API access"
                      permissions:
                        type: object
                      allowed_ips:
