    post:
      summary: Create account-scoped API key
      description: |
        Create a new API key for a specific account with granular permissions.
        
        **🔑 Requires Admin API Key**
        
        **⚠️ IMPORTANT: Full API key is ONLY shown once on creation!**
        
        **PERMISSION STRUCTURE:**
        ```json
        {
          "domains": "rw",           // "r" (read), "w" (write), "rw" (both)
          "create_domains": true,    // Can create new domains
          "delete_domains": false,   // Can delete domains
          "scope": "account"         // Always "account" for scoped keys
        }
        ```
        
        **IP RESTRICTIONS:**
        - `allowed_ips: null` - Uses global allowlist only
        - `allowed_ips: [...]` - Client IP must be in BOTH global AND key-specific lists
        - Supports single IPs: `"192.168.1.100"`
        - Supports CIDR ranges: `"10.0.0.0/8"`, `"192.168.1.0/24"`
      tags:
        - API Keys
        - Security
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - account_id
              properties:
                account_id:
                  type: integer
                  description: Account ID this key will be restricted to
                  example: 5
                description:
                  type: string
                  description: Human-readable description of the key's purpose
                  example: "Customer portal API access"
                permissions:
                  type: object
                  description: Granular permissions for this key
                  properties:
                    domains:
                      type: string
                      enum: ["r", "w", "rw"]
                      description: Domain read/write permissions
                      example: "rw"
                    create_domains:
                      type: boolean
                      description: Allow creating new domains
                      example: true
                    delete_domains:
                      type: boolean
                      description: Allow deleting domains
                      example: false
                allowed_ips:
                  type: array
                  nullable: true
                  items:
                    type: string
                  description: Array of allowed IP addresses/CIDR ranges (null = no restriction)
                  example: ["192.168.1.0/24", "10.0.0.50"]
                enabled:
                  type: boolean
                  description: Enable the key immediately
                  default: true
                  example: true
                expires_at:
                  type: string
                  format: date-time
                  nullable: true
                  description: Expiration timestamp (null = never expires)
                  example: "2026-12-31 23:59:59"
      responses:
        '201':
          description: API key created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "API key created successfully"
