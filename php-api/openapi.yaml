components:
  securitySchemes:
    AdminApiKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: |
        **ADMIN API KEY + GLOBAL IP ALLOWLIST AUTHENTICATION**
        
        **DUAL AUTHENTICATION - SIMPLE & SECURE:**
        1. **Valid Admin API Key** - Single key for all administrative access  
        2. **Global IP Allowlist** - Same allowlist applies to ALL endpoints uniformly
        
        **📋 AUTHENTICATION REQUIREMENTS:**
        - **Swagger UI access** - No authentication required (for easy development)
        - **OpenAPI documentation** - No authentication required (for easy access)  
        - **ALL API endpoints** - Full authentication required (API key + IP allowlist)
        - **Health check** - No authentication required (monitoring)
        
        **API Key Format:** `X-API-Key: <your-api-key>`
        
        **Example:** 
        ```
        Authorization: Basic NDZiM2Q3OGM1NTdjZDY2YTA0N2EzODg5NzkxNGQyMDNhYjVjMzU5NzE5MTYxZTgzNmVjY2U1NTA4ZTU3YjFhOTo=
        ```
        
        **🛡️ GLOBAL IP ALLOWLIST - DATABASE-DRIVEN & DYNAMIC:**
        - Single allowlist applies to ALL API endpoints uniformly
        - **Stored in MySQL database** for persistence and easy management
        - No per-endpoint complexity - either you're allowed or you're not
        - Both IPv4 and IPv6 addresses supported with CIDR notation
        - **Enable/disable IPs** without deletion for temporary access control
        - Easy to manage via CLI tool and audit via database logs
        
        **Dynamic Management via CLI:**
        ```bash
        # List all allowed IPs
        php manage-ips-clean.php list
        
        # Add IPs with descriptions
        php manage-ips-clean.php add "203.0.113.25" "Admin home IP"
        php manage-ips-clean.php add "192.168.1.0/24" "Office network"
        php manage-ips-clean.php add "2001:db8::/32" "IPv6 network"
        
        # Temporarily disable/enable IPs
        php manage-ips-clean.php disable "203.0.113.25"
        php manage-ips-clean.php enable "203.0.113.25"
        
        # Remove IPs permanently
        php manage-ips-clean.php remove "203.0.113.25"
        
        # Test IP access
        php manage-ips-clean.php test "192.168.1.100"
        ```
        
        **Database Storage:**
        ```sql
        -- IPs stored in ip_allowlist table
        SELECT ip_address, description, enabled 
        FROM ip_allowlist 
        WHERE enabled = 1;
        ```
        
        **Security Benefits:**
        - **Defense in depth:** Both API key AND IP must be valid
        - **Zero complexity:** Same rules apply everywhere  
        - **Dynamic management:** Add/remove IPs without restarts
        - **Database persistence:** Changes survive server restarts
        - **Temporary control:** Enable/disable without deletion
        - **Complete protection:** API inaccessible from non-allowed IPs
        - **Performance:** In-memory caching with database fallback
        
        **Security Notes:**
        - **Dual authentication:** API key AND IP allowlist required
        - One API key for all administrative operations  
        - Full access to accounts, domains, templates, and DNS records
        - **Database-driven allowlist** prevents unauthorized access even with valid key
        - Should be rotated regularly and kept secure
        - **Update allowlist dynamically** via CLI tool when network changes
        - **Audit trail:** All IP changes tracked in database with timestamps
      
  responses:
    BadRequest:
      description: Bad Request - Invalid input data
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
    
    Unauthorized:
      description: Unauthorized - Authentication required  
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
    
    Forbidden:
      description: |
        Forbidden - Access denied due to security restrictions
        - Invalid or missing API key
        - IP address not in allowlist  
        - Insufficient privileges for operation
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                enum:
                  - "IP address not authorized for API access"
                  - "Invalid Admin API Key"
                  - "Insufficient privileges for this operation"
                  - "Domain not owned by authenticated user"
              client_ip:
                type: string
                description: "Client IP address (for IP blocking errors)"
              allowed_ips:
                type: array
                items:
                  type: string
                description: "List of allowed IP ranges (for debugging)"
    
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
    
    Conflict:
      description: Conflict - Resource already exists
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
    
    TooManyRequests:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
              retry_after:
                type: integer
                description: "Seconds until next request allowed"
    
    ServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string

  schemas:
    Account:
      type: object
      properties:
        id:
          type: integer
          description: Account ID
        username:
          type: string
          description: Username (unique)
        firstname:
          type: string
          description: First name
        lastname:
          type: string
          description: Last name
        email:
          type: string
          format: email
          description: Email address
        role_id:
          type: integer
          description: Role ID (2 = User, 1 = Admin)
        ip_addresses:
          type: array
          items:
            type: string
            format: ipv4 | ipv6
          description: List of IP addresses (IPv4/IPv6, local storage only)
        customer_id:
          type: integer
          description: Customer ID for business relationships
        pdns_account_id:
          type: integer
          nullable: true
          description: PowerDNS Admin account ID (synced from PowerDNS Admin)
        created_at:
          type: string
          format: date-time
          description: Creation timestamp
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp

    AccountCreate:
      type: object
      required:
        - username
        - plain_text_password
        - firstname  
        - email
      properties:
        username:
          type: string
          description: Username for PowerDNS Admin (must be unique)
        plain_text_password:
          type: string
          description: Plain text password for PowerDNS Admin user
        firstname:
          type: string
          description: First name
        lastname:
          type: string
          description: Last name
        email:
          type: string
          format: email
          description: Email address
        role:
          type: object
          description: User role object
          properties:
            id:
              type: integer
              description: Role ID (2 = User, 1 = Admin)
            name:
              type: string
              description: Role name
          required:
            - id
            - name
        ip_addresses:
          type: array
          items:
            type: string
            format: ipv4 | ipv6
          description: List of IP addresses (IPv4/IPv6, local storage only)
        customer_id:
          type: integer
          description: Customer ID for business relationships

    AccountIdentifier:
      type: object
      oneOf:
        - type: object
          required: [id]
          properties:
            id:
              type: integer
              description: Account ID
          additionalProperties: false
        - type: object
          required: [username]
          properties:
            username:
              type: string
              description: Account username
          additionalProperties: false
      description: Account identifier object (either ID or username, not both)

    AccountUpdateRequest:
      type: object
      oneOf:
        - allOf:
          - type: object
            required: [id]
            properties:
              id:
                type: integer
                description: Account ID
          - $ref: '#/components/schemas/AccountUpdate'
        - allOf:
          - type: object
            required: [username]
            properties:
              username:
                type: string
                description: Account username
          - $ref: '#/components/schemas/AccountUpdate'
      description: Account update request with identifier and update fields

    AccountUpdate:
      type: object
      properties:
        firstname:
          type: string
          description: First name
        lastname:
          type: string
          description: Last name
        email:
          type: string
          format: email
          description: Email address
        role_id:
          type: integer
          description: Role ID
        ip_addresses:
          type: array
          items:
            type: string
            format: ipv4 | ipv6
          description: List of IP addresses (IPv4/IPv6)
        customer_id:
          type: integer
          nullable: true
          description: Customer ID

    Domain:
      type: object
      properties:
        id:
          type: integer
          description: Domain ID
        name:
          type: string
          description: Domain name
        type:
          type: string
          description: Domain type
        account_id:
          type: integer
          nullable: true
          description: Associated account ID
        account_name:
          type: string
          nullable: true
          description: Associated account name
        pdns_zone_id:
          type: string
          description: PDNSAdmin zone ID
        kind:
          type: string
          enum: [Native, Master, Slave]
          description: Zone kind
        masters:
          type: string
          description: Comma-separated list of master servers
        dnssec:
          type: boolean
          description: DNSSEC enabled
        account:
          type: string
          description: Account name from PDNSAdmin
        created_at:
          type: string
          format: date-time
          description: Creation timestamp
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp

    IPAllowlistEntry:
      type: object
      properties:
        id:
          type: integer
          description: Allowlist entry ID
          example: 1
        ip_address:
          type: string
          description: IP address or CIDR range
          example: "192.168.1.100"
        description:
          type: string
          description: Description of this IP entry
          example: "Office workstation"
        enabled:
          type: boolean
          description: Whether this IP is currently enabled
          example: true
        created_at:
          type: string
          format: date-time
          description: When this entry was created
          example: "2025-08-10T08:30:00Z"
        updated_at:
          type: string
          format: date-time
          description: When this entry was last updated
          example: "2025-08-10T08:30:00Z"

    DomainUpdate:
      type: object
      properties:
        account_id:
          type: integer
          nullable: true
          description: Account ID to assign domain to (null to remove)
        kind:
          type: string
          enum: [Native, Master, Slave]
          description: Zone kind
        masters:
          type: array
          items:
            type: string
          description: List of master servers
        dnssec:
          type: boolean
          description: Enable DNSSEC

    DomainSearchResult:
      type: object
      properties:
        id:
          type: integer
          description: Local database ID
        name:
          type: string
          description: Domain name
        pdns_zone_id:
          type: integer
          description: PowerDNS zone ID

    DomainDetails:
      type: object
      description: Complete domain information from PowerDNS Server API
      properties:
        id:
          type: string
          description: Zone ID (FQDN with trailing dot)
        name:
          type: string
          description: Zone name (FQDN with trailing dot)
        type:
          type: string
          description: Resource type
        kind:
          type: string
          description: Zone kind
        dnssec:
          type: boolean
          description: DNSSEC enabled
        edited_serial:
          type: integer
          description: Last edited serial
        masters:
          type: array
          items:
            type: string
          description: Master server addresses
        rrsets:
          type: array
          description: DNS record sets
          items:
            $ref: '#/components/schemas/RRSet'

    RRSet:
      type: object
      description: DNS Resource Record Set
      properties:
        name:
          type: string
          description: Record name (FQDN with trailing dot)
        type:
          type: string
          description: DNS record type
        ttl:
          type: integer
          description: Time to live in seconds
        records:
          type: array
          description: DNS records in this set
          items:
            $ref: '#/components/schemas/DNSRecord'

    DNSRecord:
      type: object
      description: Individual DNS record
      properties:
        content:
          type: string
          description: Record content/value
        disabled:
          type: boolean
          description: Whether record is disabled

    RRSetUpdate:
      type: object
      description: |
        DNS record set update operation with security validation.
        
        **🛡️ SECURITY VALIDATION:**
        - Record names must belong to the domain being updated
        - DNS record content validated for proper format
        - Dangerous record types (NS, SOA) require additional verification
        - Maximum 100 records per update to prevent abuse
      required:
        - name
        - type
        - changetype
      properties:
        name:
          type: string
          description: Record name (FQDN with trailing dot) - must be subdomain of zone
          pattern: "^[a-zA-Z0-9]([a-zA-Z0-9\\-]{0,61}[a-zA-Z0-9])?(\\.[a-zA-Z0-9]([a-zA-Z0-9\\-]{0,61}[a-zA-Z0-9])?)*\\.$"
        type:
          type: string
          description: DNS record type (A, AAAA, CNAME, MX, TXT, SRV)
          enum: ["A", "AAAA", "CNAME", "MX", "TXT", "SRV", "PTR", "NS"]
        changetype:
          type: string
          enum: ["REPLACE", "DELETE"]
          description: Operation type
        records:
          type: array
          description: Records for REPLACE operations (omit for DELETE)
          maxItems: 100
          items:
            $ref: '#/components/schemas/DNSRecord'

    DomainAccountAdd:
      type: object
      required:
        - domain_name
        - account_id
      properties:
        domain_name:
          type: string
          description: Domain name to add to account
        account_id:
          type: integer
          description: Account ID

    DomainAccountRemove:
      type: object
      required:
        - domain_name
      properties:
        domain_name:
          type: string
          description: Domain name to remove from account

    DomainAccountList:
      type: object
      required:
        - account_id
      properties:
        account_id:
          type: integer
          description: Account ID to list domains for

    AccountDomainsList:
      type: object
      properties:
        data:
          type: object
          properties:
            account:
              type: object
              properties:
                id:
                  type: integer
                name:
                  type: string
            domains:
              type: array
              items:
                $ref: '#/components/schemas/Domain'
            domain_count:
              type: integer
        message:
          type: string

    ApiStatus:
      type: object
      properties:
        data:
          type: object
          properties:
            api_version:
              type: string
            timestamp:
              type: string
              format: date-time
            endpoints:
              type: object
              additionalProperties:
                type: string
                accounts: "/api/accounts"
                domains: "/api/domains"
                status: "/api/status"
            pdns_admin_status:
              type: string
              enum: [connected, disconnected]
            database_status:
              type: string
              enum: [connected, disconnected]
        message:
          type: string

    ConnectionTest:
      type: object
      properties:
        data:
          type: object
          properties:
            status:
              type: string
              enum: [connected, disconnected]
            pdns_domains_count:
              type: integer
        message:
          type: string

    SyncResult:
      type: object
      properties:
        data:
          type: object
          properties:
            accounts:
              type: object
              properties:
                status:
                  type: string
                count:
                  type: integer
            domains:
              type: object
              properties:
                status:
                  type: string
                count:
                  type: integer
        message:
          type: string

    HealthCheck:
      type: object
      properties:
        data:
          type: object
          properties:
            database:
              type: string
              enum: [connected, disconnected, unknown]
            timestamp:
              type: string
              format: date-time
            version:
              type: string
            local_accounts_count:
              type: integer
            local_domains_count:
              type: integer
        message:
          type: string

    ApiDocumentation:
      type: object
      properties:
        data:
          type: object
          properties:
            name:
              type: string
            version:
              type: string
            description:
              type: string
            endpoints:
              type: object
              additionalProperties:
                type: string
                accounts: "/api/accounts"
                domains: "/api/domains"
                status: "/api/status"
            setup_instructions:
              type: array
              items:
                type: string
        message:
          type: string

    SuccessMessage:
      type: object
      properties:
        message:
          type: string

    Template:
      type: object
      properties:
        id:
          type: integer
          description: Template ID
        name:
          type: string
          description: Template name
        description:
          type: string
          description: Template description
        records:
          type: array
          items:
            $ref: '#/components/schemas/TemplateRecord'
          description: Template records
        created_at:
          type: string
          format: date-time
          description: Creation timestamp
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp

    TemplateCreate:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Template name
        description:
          type: string
          description: Template description
        records:
          type: array
          items:
            $ref: '#/components/schemas/TemplateRecordCreate'
          description: Template records to create

    TemplateUpdate:
      type: object
      properties:
        name:
          type: string
          description: Template name
        description:
          type: string
          description: Template description
        records:
          type: array
          items:
            $ref: '#/components/schemas/TemplateRecordCreate'
          description: Template records

    TemplateRecord:
      type: object
      properties:
        id:
          type: integer
          description: Record ID
        name:
          type: string
          description: Record name
        type:
          type: string
          description: Record type
        content:
          type: string
          description: Record content
        ttl:
          type: integer
          description: Time to live
        priority:
          type: integer
          description: Record priority (for MX records)

    TemplateRecordCreate:
      type: object
      required:
        - name
        - type
        - content
      properties:
        name:
          type: string
          description: Record name
        type:
          type: string
          enum: [A, AAAA, CNAME, MX, TXT, NS, PTR, SRV]
          description: Record type
        content:
          type: string
          description: Record content
        ttl:
          type: integer
          description: Time to live, default 3600
        priority:
          type: integer
          description: Record priority (for MX records)

    ApiKey:
      type: object
      properties:
        id:
          type: integer
          description: API key ID
          example: 3
        key_preview:
          type: string
          description: First 12 characters of API key (full key never returned)
          example: "pdns_d0dbc9f..."
        account_id:
          type: integer
          nullable: true
          description: Account ID this key is restricted to (null = admin key)
          example: 5
        description:
          type: string
          description: Human-readable description
          example: "Production API key for customer portal"
        permissions:
          type: object
          nullable: true
          description: Permission configuration (JSON)
          properties:
            domains:
              type: string
              enum: ["r", "w", "rw"]
              description: Domain access permissions
            create_domains:
              type: boolean
              description: Can create new domains
            delete_domains:
              type: boolean
              description: Can delete domains
            scope:
              type: string
              enum: ["account", "admin"]
              description: Access scope
          example:
            domains: "rw"
            create_domains: true
            delete_domains: false
            scope: "account"
        allowed_ips:
          type: array
          nullable: true
          items:
            type: string
          description: Allowed IP addresses/CIDR ranges (null = no restriction)
          example: ["192.168.1.0/24", "10.0.0.50"]
        enabled:
          type: boolean
          description: Whether the key is enabled
          example: true
        created_at:
          type: string
          format: date-time
          description: Creation timestamp
          example: "2025-12-07 10:30:00"
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp
          example: "2025-12-07 10:30:00"
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: Expiration timestamp (null = never expires)
          example: null
        last_used_at:
          type: string
          format: date-time
          nullable: true
          description: Last usage timestamp
          example: "2025-12-07 15:45:00"
        created_by:
          type: integer
          nullable: true
          description: Admin user who created this key
          example: null

    Error:
      type: object
      properties:
        error:
          type: string
          description: Error message
        errors:
          type: array
          items:
            type: string
          description: Detailed error messages

  responses:
    BadRequest:
      description: Bad request - Invalid input data
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
            error: "Invalid request data"
            errors: ["Name is required", "Email format is invalid"]

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
            error: "Resource not found"

    Conflict:
      description: Conflict - Resource already exists
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
            error: "Account already exists"

    ServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
            error: "Internal server error"

